<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>星轨闪避</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      --ink: #f8fbff;
      --muted: #b7c3d9;
      --panel: rgba(9, 14, 27, 0.7);
      --panel-strong: rgba(10, 17, 31, 0.88);
      --line: rgba(255, 255, 255, 0.16);
      --mint: #79ffd7;
      --gold: #ffd166;
      --rose: #ff6b8b;
      --sky: #7dc8ff;
      --violet: #b69cff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(39, 132, 152, 0.34), transparent 27%),
        radial-gradient(circle at 82% 12%, rgba(173, 96, 121, 0.26), transparent 31%),
        linear-gradient(158deg, #07101e 0%, #15101d 49%, #071f23 100%);
      color: var(--ink);
      touch-action: none;
      user-select: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      min-width: 280px;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: relative;
      z-index: 4;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .hud-stack {
      display: grid;
      gap: 8px;
      max-width: min(620px, calc(100vw - 164px));
    }

    .stats {
      display: grid;
      grid-template-columns: minmax(86px, 1.35fr) repeat(3, minmax(58px, 0.85fr));
      gap: 8px;
    }

    .stat,
    .meter-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(18px);
    }

    .stat {
      min-height: 56px;
      padding: 8px 10px;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      margin-top: 5px;
      font-size: clamp(18px, 4.2vw, 30px);
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .meter-panel {
      display: grid;
      grid-template-columns: auto minmax(86px, 1fr);
      align-items: center;
      gap: 12px;
      min-height: 42px;
      padding: 8px 10px;
    }

    .life-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .life {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      background: linear-gradient(145deg, var(--rose), #ffc56f);
      box-shadow: 0 0 14px rgba(255, 107, 139, 0.55);
      transform: rotate(45deg);
    }

    .life.empty {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: none;
    }

    .dash-bar {
      position: relative;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .dash-bar span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--sky), var(--mint), var(--gold));
      box-shadow: 0 0 18px rgba(121, 255, 215, 0.46);
      transition: width 110ms linear;
    }

    .dash-bar.ready span {
      animation: pulseBar 1.1s ease-in-out infinite;
    }

    @keyframes pulseBar {
      0%,
      100% {
        filter: brightness(1);
      }

      50% {
        filter: brightness(1.35);
      }
    }

    .actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .icon-button,
    .touch-button,
    .start-button {
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, filter 140ms ease;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(9, 15, 28, 0.7);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(16px);
    }

    .icon-button:hover,
    .touch-button:hover {
      background: rgba(37, 54, 82, 0.86);
      border-color: rgba(255, 255, 255, 0.28);
      transform: translateY(-1px);
    }

    .icon-button:active,
    .touch-button:active,
    .start-button:active {
      transform: translateY(1px) scale(0.98);
    }

    .icon-button svg,
    .touch-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(19, 31, 49, 0.42), rgba(5, 8, 16, 0.74)),
        rgba(5, 8, 16, 0.38);
      backdrop-filter: blur(11px);
    }

    .dialog {
      width: min(430px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      padding: 22px;
      text-align: center;
    }

    .mark {
      width: 104px;
      aspect-ratio: 1;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      animation: hoverMark 3.2s ease-in-out infinite;
    }

    .mark svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 22px rgba(121, 255, 215, 0.44));
    }

    @keyframes hoverMark {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 58px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 12px auto 18px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      max-width: 25em;
    }

    .mode-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 0 16px;
    }

    .mode-button {
      min-height: 54px;
      padding: 8px 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-weight: 750;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .mode-button span {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      font-weight: 650;
      line-height: 1.15;
      color: rgba(248, 251, 255, 0.66);
    }

    .mode-button:hover,
    .mode-button.active {
      transform: translateY(-1px);
      border-color: rgba(121, 255, 215, 0.48);
      background: rgba(121, 255, 215, 0.14);
      color: var(--ink);
    }

    .result-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0 18px;
    }

    .result-item {
      min-height: 56px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .result-item small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .result-item strong {
      display: block;
      margin-top: 5px;
      font-size: clamp(17px, 4.8vw, 24px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .start-button {
      min-width: 158px;
      height: 48px;
      padding: 0 24px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2bd4c7, #ffd166);
      color: #07101e;
      font-weight: 850;
      box-shadow: 0 14px 34px rgba(43, 212, 199, 0.3);
    }

    .start-button:hover {
      filter: brightness(1.07);
      transform: translateY(-1px);
    }

    .touch-controls {
      position: absolute;
      z-index: 4;
      left: max(14px, env(safe-area-inset-left));
      right: max(14px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .touch-group {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-button {
      width: clamp(56px, 15vw, 74px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(10, 17, 31, 0.62);
      color: var(--ink);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .touch-button.is-down,
    .touch-button.is-ready {
      background: rgba(125, 200, 255, 0.24);
      border-color: rgba(121, 255, 215, 0.42);
    }

    .coach {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: max(104px, calc(env(safe-area-inset-bottom) + 96px));
      min-height: 34px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 8px 12px;
      border: 1px solid rgba(121, 255, 215, 0.26);
      border-radius: 8px;
      background: rgba(7, 16, 30, 0.68);
      color: #f8fbff;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.26);
      text-align: center;
      font-size: 13px;
      line-height: 1.35;
      transform: translateX(-50%);
      pointer-events: none;
      backdrop-filter: blur(12px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .coach.hidden {
      display: block;
      opacity: 0;
      transform: translateX(-50%) translateY(8px);
    }

    .hidden {
      display: none;
    }

    body.low-power .stat,
    body.low-power .meter-panel,
    body.low-power .icon-button,
    body.low-power .touch-button,
    body.low-power .dialog {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      backdrop-filter: none;
    }

    body.low-power .mark {
      animation: none;
    }

    body.low-power .dash-bar.ready span {
      animation: none;
    }

    @media (max-width: 640px) {
      .hud {
        gap: 8px;
      }

      .hud-stack {
        max-width: calc(100vw - 112px);
      }

      .stats {
        grid-template-columns: repeat(4, minmax(45px, 1fr));
        gap: 6px;
      }

      .stat {
        min-height: 48px;
        padding: 7px 7px;
      }

      .stat small,
      .result-item small {
        font-size: 10px;
      }

      .stat strong {
        font-size: clamp(15px, 4.8vw, 21px);
      }

      .meter-panel {
        min-height: 38px;
        gap: 8px;
        padding: 7px;
      }

      .life {
        width: 13px;
        height: 13px;
      }

      .actions {
        flex-direction: column;
        gap: 6px;
      }

      .icon-button {
        width: 40px;
        height: 40px;
      }

      .dialog {
        padding: 18px;
      }

      .mode-panel {
        gap: 6px;
      }

      .mode-button {
        min-height: 50px;
        padding: 7px 4px;
        font-size: 13px;
      }

      .mark {
        width: 88px;
      }

      .touch-button {
        width: clamp(62px, 17vw, 82px);
      }

      #dashButton {
        width: clamp(74px, 21vw, 96px);
      }

      .coach {
        bottom: max(112px, calc(env(safe-area-inset-bottom) + 104px));
        font-size: 12px;
      }
    }

    @media (max-height: 560px) {
      .touch-controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="星轨闪避">
    <canvas id="game" aria-hidden="true"></canvas>

    <header class="hud" aria-live="polite">
      <div class="hud-stack">
        <div class="stats">
          <div class="stat">
            <small>分数</small>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <small>最高</small>
            <strong id="best">0</strong>
          </div>
          <div class="stat">
            <small>连击</small>
            <strong id="combo">x1.0</strong>
          </div>
          <div class="stat">
            <small>星域</small>
            <strong id="sector">01</strong>
          </div>
        </div>
        <div class="meter-panel">
          <div class="life-row" id="lives"></div>
          <div class="dash-bar" id="dashBar"><span id="dashFill"></span></div>
        </div>
      </div>

      <div class="actions">
        <button class="icon-button" id="soundButton" type="button" aria-label="音乐与音效">
          <svg id="soundIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M11 5 6 9H3v6h3l5 4Z"></path>
            <path d="M16 9.5a4 4 0 0 1 0 5"></path>
            <path d="M19 7a8 8 0 0 1 0 10"></path>
          </svg>
        </button>
        <button class="icon-button" id="pauseButton" type="button" aria-label="暂停">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 5v14"></path>
            <path d="M15 5v14"></path>
          </svg>
        </button>
        <button class="icon-button" id="restartButton" type="button" aria-label="重开">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 1 1-2.34-5.66"></path>
            <path d="M20 4v7h-7"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="overlay" id="overlay">
      <div class="dialog">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 140 140">
            <defs>
              <linearGradient id="shipPaint" x1="23" x2="113" y1="118" y2="18" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7dc8ff"></stop>
                <stop offset="0.48" stop-color="#79ffd7"></stop>
                <stop offset="1" stop-color="#ffd166"></stop>
              </linearGradient>
              <radialGradient id="aura" cx="50%" cy="50%" r="50%">
                <stop stop-color="#79ffd7" stop-opacity="0.48"></stop>
                <stop offset="1" stop-color="#79ffd7" stop-opacity="0"></stop>
              </radialGradient>
            </defs>
            <circle cx="70" cy="70" r="60" fill="url(#aura)"></circle>
            <path d="M70 10 96 84 70 70 44 84Z" fill="url(#shipPaint)"></path>
            <path d="M70 70 84 126 70 111 56 126Z" fill="#ff6b8b"></path>
            <path d="M50 86 20 105 38 66Z" fill="#7dc8ff" opacity="0.9"></path>
            <path d="M90 86 120 105 102 66Z" fill="#ffd166" opacity="0.9"></path>
            <ellipse cx="70" cy="51" rx="9" ry="13" fill="#07101e" opacity="0.72"></ellipse>
          </svg>
        </div>
        <h1 id="overlayTitle">星轨闪避</h1>
        <p id="overlayText">穿过星潮，夺回星核。</p>
        <div class="mode-panel" id="modePanel" aria-label="难度模式">
          <button class="mode-button active" type="button" data-mode="easy">简单<span>更轻松</span></button>
          <button class="mode-button" type="button" data-mode="normal">中级<span>推荐</span></button>
          <button class="mode-button" type="button" data-mode="hard">高级<span>更刺激</span></button>
        </div>
        <div class="result-row" id="resultRow">
          <div class="result-item">
            <small>本局</small>
            <strong id="resultScore">0</strong>
          </div>
          <div class="result-item">
            <small>最高</small>
            <strong id="resultBest">0</strong>
          </div>
          <div class="result-item">
            <small>评级</small>
            <strong id="resultRank">C</strong>
          </div>
          <div class="result-item">
            <small>存活</small>
            <strong id="resultTime">0s</strong>
          </div>
          <div class="result-item">
            <small>最高连击</small>
            <strong id="resultCombo">x1.0</strong>
          </div>
          <div class="result-item">
            <small>擦身</small>
            <strong id="resultNear">0</strong>
          </div>
        </div>
        <button class="start-button" id="startButton" type="button">开始</button>
      </div>
    </section>

    <div class="coach hidden" id="coach">按住屏幕拖动飞船，右下角闪电可冲刺。</div>

    <nav class="touch-controls" aria-label="移动">
      <div class="touch-group">
        <button class="touch-button" id="leftButton" type="button" aria-label="左移">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </button>
        <button class="touch-button" id="rightButton" type="button" aria-label="右移">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
        </button>
      </div>
      <button class="touch-button" id="dashButton" type="button" aria-label="冲刺">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m13 2-8 12h7l-1 8 8-12h-7z"></path>
        </svg>
      </button>
    </nav>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const comboEl = document.getElementById("combo");
      const sectorEl = document.getElementById("sector");
      const livesEl = document.getElementById("lives");
      const dashBar = document.getElementById("dashBar");
      const dashFill = document.getElementById("dashFill");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const resultRow = document.getElementById("resultRow");
      const resultScore = document.getElementById("resultScore");
      const resultBest = document.getElementById("resultBest");
      const resultRank = document.getElementById("resultRank");
      const resultTime = document.getElementById("resultTime");
      const resultCombo = document.getElementById("resultCombo");
      const resultNear = document.getElementById("resultNear");
      const coach = document.getElementById("coach");
      const startButton = document.getElementById("startButton");
      const soundButton = document.getElementById("soundButton");
      const soundIcon = document.getElementById("soundIcon");
      const pauseButton = document.getElementById("pauseButton");
      const restartButton = document.getElementById("restartButton");
      const leftButton = document.getElementById("leftButton");
      const rightButton = document.getElementById("rightButton");
      const dashButton = document.getElementById("dashButton");
      const modePanel = document.getElementById("modePanel");
      const modeButtons = [...document.querySelectorAll(".mode-button")];
      const spriteSources = {
        ship: "assets/sprites/ship-ai.png",
        meteor: "assets/sprites/meteor-ai.png",
        prism: "assets/sprites/prism-ai.png",
      };
      const sprites = Object.fromEntries(
        Object.entries(spriteSources).map(([key, src]) => {
          const image = new Image();
          image.decoding = "async";
          image.src = src;
          return [key, image];
        })
      );

      const storage = {
        get(key, fallback) {
          try {
            const value = localStorage.getItem(key);
            return value === null ? fallback : value;
          } catch (_) {
            return fallback;
          }
        },
        set(key, value) {
          try {
            localStorage.setItem(key, value);
          } catch (_) {
            return false;
          }
          return true;
        },
      };

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        playing: false,
        paused: false,
        ended: false,
        mode: storage.get("starDodgeModeV1", "easy"),
        score: 0,
        best: Number(storage.get("starDodgeBestV2", storage.get("starDodgeBest", 0)) || 0),
        lives: 3,
        maxLives: 3,
        combo: 0,
        comboTimer: 0,
        multiplier: 1,
        maxCombo: 0,
        nearMisses: 0,
        hitsTaken: 0,
        coachText: "",
        coachTimer: 0,
        sector: 1,
        time: 0,
        scroll: 0,
        spawnTimer: 0,
        waveTimer: 3.4,
        dashCharge: 1,
        dashActive: 0,
        invincible: 0,
        shake: 0,
        flash: 0,
        objects: [],
        particles: [],
        floaters: [],
        shockwaves: [],
        stars: [],
        nebulae: [],
        perf: {
          mobile: false,
          lowPower: false,
          maxParticles: 140,
          maxTrail: 7,
          starDensity: 7600,
          nebulaCount: 5,
          drawNebulaEveryFrame: true,
          drawObjectTrails: true,
          drawPlayerGlow: true,
          targetDpr: 2,
        },
        keys: new Set(),
        pointerX: null,
        muted: storage.get("starDodgeMutedV2", "0") === "1",
      };

      const player = {
        x: 0,
        y: 0,
        radius: 24,
        vx: 0,
        lean: 0,
        trail: [],
      };

      let audioCtx = null;
      let music = null;

      const modes = {
        easy: {
          label: "简单",
          difficulty: 0.82,
          speed: 0.86,
          spawn: 1.22,
          meteorCount: 0.7,
          meteorSize: 1.18,
          score: 0.9,
          lives: 4,
          intro: "简单模式：陨石更少，适合放松消遣。",
        },
        normal: {
          label: "中级",
          difficulty: 1,
          speed: 1,
          spawn: 1,
          meteorCount: 0.86,
          meteorSize: 1.22,
          score: 1,
          lives: 3,
          intro: "中级模式：节奏均衡，适合朋友试玩。",
        },
        hard: {
          label: "高级",
          difficulty: 1.18,
          speed: 1.12,
          spawn: 0.84,
          meteorCount: 1,
          meteorSize: 1.3,
          score: 1.14,
          lives: 3,
          intro: "高级模式：速度更快，得分也更高。",
        },
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function currentMode() {
        return modes[state.mode] || modes.easy;
      }

      function setMode(mode) {
        if (!modes[mode]) return;
        state.mode = mode;
        storage.set("starDodgeModeV1", mode);
        modeButtons.forEach((button) => button.classList.toggle("active", button.dataset.mode === mode));
        if (!state.playing || state.ended) {
          overlayText.textContent = currentMode().intro;
        }
      }

      function formatScore(value) {
        return String(Math.max(0, Math.floor(value)));
      }

      function formatTime(value) {
        return `${Math.max(0, Math.floor(value))}s`;
      }

      function rankFor(score) {
        if (score >= 4200) return "S";
        if (score >= 2800) return "A";
        if (score >= 1500) return "B";
        if (score >= 700) return "C";
        return "D";
      }

      function nextRankHint(score) {
        const ladder = [
          { rank: "C", score: 700 },
          { rank: "B", score: 1500 },
          { rank: "A", score: 2800 },
          { rank: "S", score: 4200 },
        ];
        const next = ladder.find((item) => score < item.score);
        if (!next) return "已达到最高评级";
        return `距 ${next.rank} 级还差 ${Math.ceil(next.score - score)} 分`;
      }

      function setCoach(text, duration = 2.6) {
        state.coachText = text;
        state.coachTimer = duration;
        coach.textContent = text;
        coach.classList.remove("hidden");
      }

      function updateCoach(dt) {
        if (state.coachTimer <= 0) return;
        state.coachTimer -= dt;
        if (state.coachTimer <= 0) {
          coach.classList.add("hidden");
        }
      }

      function configurePerformance() {
        const coarsePointer = matchMedia("(pointer: coarse)").matches;
        const narrow = Math.min(window.innerWidth, window.innerHeight) < 760;
        const memory = navigator.deviceMemory || 4;
        state.perf.mobile = coarsePointer || narrow;
        state.perf.lowPower = state.perf.mobile || memory <= 4;
        state.perf.targetDpr = state.perf.lowPower ? Math.min(window.devicePixelRatio || 1, 1.35) : Math.min(window.devicePixelRatio || 1, 2);
        state.perf.starDensity = state.perf.lowPower ? 10500 : 5200;
        state.perf.nebulaCount = state.perf.lowPower ? 2 : 5;
        state.perf.maxParticles = state.perf.lowPower ? 72 : 140;
        state.perf.maxTrail = state.perf.lowPower ? 3 : 7;
        state.perf.drawNebulaEveryFrame = !state.perf.lowPower;
        state.perf.drawObjectTrails = !state.perf.lowPower;
        state.perf.drawPlayerGlow = !state.perf.lowPower;
        document.body.classList.toggle("low-power", state.perf.lowPower);
      }

      function ensureAudio() {
        if (state.muted) return null;
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return null;
          audioCtx = new AudioContext();
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }

      function tone(freq, duration, type = "sine", gain = 0.045, glide = 1) {
        const ac = ensureAudio();
        if (!ac) return;
        const osc = ac.createOscillator();
        const amp = ac.createGain();
        const now = ac.currentTime;
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(30, freq * glide), now + duration);
        amp.gain.setValueAtTime(0.0001, now);
        amp.gain.exponentialRampToValueAtTime(gain, now + 0.015);
        amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(amp).connect(ac.destination);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function playSound(name) {
        if (state.muted) return;
        if (name === "collect") {
          tone(720, 0.09, "triangle", 0.035, 1.35);
          setTimeout(() => tone(980, 0.08, "triangle", 0.025, 1.12), 35);
        } else if (name === "hit") {
          tone(190, 0.18, "sawtooth", 0.055, 0.52);
        } else if (name === "dash") {
          tone(320, 0.2, "square", 0.028, 2.8);
          tone(82, 0.24, "sine", 0.032, 0.78);
        } else if (name === "shield") {
          tone(520, 0.1, "sine", 0.03, 1.5);
          setTimeout(() => tone(860, 0.14, "sine", 0.03, 1.18), 45);
        } else if (name === "start") {
          tone(440, 0.08, "triangle", 0.035, 1.45);
          setTimeout(() => tone(660, 0.1, "triangle", 0.035, 1.18), 55);
        }
      }

      function scheduleMusic(ac, startAt) {
        const master = ac.createGain();
        const filter = ac.createBiquadFilter();
        const delay = ac.createDelay(0.45);
        const feedback = ac.createGain();
        const wet = ac.createGain();
        const bassNotes = [110, 110, 146.83, 130.81, 98, 98, 130.81, 146.83];
        const leadNotes = [440, 523.25, 659.25, 587.33, 523.25, 440, 392, 329.63];
        const step = 0.24;

        master.gain.value = 0.13;
        filter.type = "lowpass";
        filter.frequency.value = 1600;
        filter.Q.value = 0.7;
        delay.delayTime.value = 0.18;
        feedback.gain.value = 0.28;
        wet.gain.value = 0.15;

        master.connect(filter).connect(ac.destination);
        master.connect(delay).connect(wet).connect(ac.destination);
        delay.connect(feedback).connect(delay);

        for (let i = 0; i < 32; i += 1) {
          const t = startAt + i * step;
          const bass = ac.createOscillator();
          const bassAmp = ac.createGain();
          bass.type = "triangle";
          bass.frequency.value = bassNotes[i % bassNotes.length];
          bassAmp.gain.setValueAtTime(0.0001, t);
          bassAmp.gain.exponentialRampToValueAtTime(i % 2 === 0 ? 0.26 : 0.16, t + 0.015);
          bassAmp.gain.exponentialRampToValueAtTime(0.0001, t + step * 0.82);
          bass.connect(bassAmp).connect(master);
          bass.start(t);
          bass.stop(t + step);

          if (i % 2 === 0) {
            const lead = ac.createOscillator();
            const leadAmp = ac.createGain();
            lead.type = "square";
            lead.frequency.value = leadNotes[(i / 2) % leadNotes.length];
            leadAmp.gain.setValueAtTime(0.0001, t + 0.04);
            leadAmp.gain.exponentialRampToValueAtTime(0.095, t + 0.06);
            leadAmp.gain.exponentialRampToValueAtTime(0.0001, t + step * 1.4);
            lead.connect(leadAmp).connect(master);
            lead.start(t + 0.04);
            lead.stop(t + step * 1.5);
          }

          if (i % 4 === 2) {
            const noiseBuffer = ac.createBuffer(1, ac.sampleRate * 0.045, ac.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let j = 0; j < data.length; j += 1) data[j] = Math.random() * 2 - 1;
            const noise = ac.createBufferSource();
            const noiseAmp = ac.createGain();
            const noiseFilter = ac.createBiquadFilter();
            noise.buffer = noiseBuffer;
            noiseFilter.type = "highpass";
            noiseFilter.frequency.value = 4200;
            noiseAmp.gain.setValueAtTime(0.0001, t);
            noiseAmp.gain.exponentialRampToValueAtTime(0.05, t + 0.008);
            noiseAmp.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
            noise.connect(noiseFilter).connect(noiseAmp).connect(master);
            noise.start(t);
            noise.stop(t + 0.05);
          }
        }

        return {
          master,
          stopAt: startAt + 32 * step,
        };
      }

      function startMusic() {
        if (state.muted || music) return;
        const ac = ensureAudio();
        if (!ac) return;
        tone(330, 0.08, "triangle", 0.035, 1.2);
        const loop = () => {
          if (!music || state.muted) return;
          const now = ac.currentTime;
          if (music.nextAt - now < 1.2) {
            const scheduled = scheduleMusic(ac, music.nextAt);
            music.nodes.push(scheduled);
            music.nextAt = scheduled.stopAt;
            music.nodes = music.nodes.filter((entry) => {
              if (entry.stopAt + 1.5 > now) return true;
              try {
                entry.master.disconnect();
              } catch (_) {
                // The node may already be disconnected.
              }
              return false;
            });
          }
          music.timer = setTimeout(loop, 600);
        };
        music = {
          nextAt: ac.currentTime + 0.05,
          timer: null,
          nodes: [],
        };
        loop();
      }

      function stopMusic() {
        if (!music) return;
        clearTimeout(music.timer);
        for (const entry of music.nodes) {
          try {
            entry.master.gain.exponentialRampToValueAtTime(0.0001, (audioCtx?.currentTime || 0) + 0.08);
            setTimeout(() => {
              try {
                entry.master.disconnect();
              } catch (_) {
                // The node may already be disconnected.
              }
            }, 140);
          } catch (_) {
            // Audio nodes may already be stopped.
          }
        }
        music = null;
      }

      function updateSoundIcon() {
        soundIcon.innerHTML = state.muted
          ? '<path d="M11 5 6 9H3v6h3l5 4Z"></path><path d="m17 9 4 6"></path><path d="m21 9-4 6"></path>'
          : '<path d="M11 5 6 9H3v6h3l5 4Z"></path><path d="M16 9.5a4 4 0 0 1 0 5"></path><path d="M19 7a8 8 0 0 1 0 10"></path>';
      }

      function resize() {
        configurePerformance();
        state.dpr = state.perf.targetDpr;
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        player.y = state.height - clamp(state.height * 0.16, 88, 140);
        player.x = clamp(player.x || state.width / 2, 42, state.width - 42);
        seedSpace();
      }

      function seedSpace() {
        const count = clamp(Math.round((state.width * state.height) / state.perf.starDensity), state.perf.lowPower ? 58 : 115, state.perf.lowPower ? 150 : 360);
        state.stars = Array.from({ length: count }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          r: rand(0.45, 2.8),
          depth: rand(0.35, 1.45),
          alpha: rand(0.28, 0.94),
          twinkle: rand(0.8, 2.5),
          color: pick(["#f8fbff", "#7dc8ff", "#79ffd7", "#ffd166"]),
          flare: Math.random() > 0.88,
        }));
        state.nebulae = Array.from({ length: state.perf.nebulaCount }, (_, index) => ({
          x: (index / Math.max(1, state.perf.nebulaCount - 1)) * state.width + rand(-80, 80),
          y: rand(80, state.height * 0.75),
          r: rand(140, 340),
          color: pick(["rgba(125,200,255,0.15)", "rgba(255,107,139,0.13)", "rgba(121,255,215,0.11)", "rgba(255,209,102,0.1)"]),
          drift: rand(0.15, 0.42),
        }));
      }

      function updateHud() {
        const score = Math.floor(state.score);
        state.best = Math.max(state.best, score);
        scoreEl.textContent = formatScore(state.score);
        bestEl.textContent = formatScore(state.best);
        comboEl.textContent = `x${state.multiplier.toFixed(1)}`;
        sectorEl.textContent = String(state.sector).padStart(2, "0");
        dashFill.style.width = `${Math.round(state.dashCharge * 100)}%`;
        dashBar.classList.toggle("ready", state.dashCharge >= 1);
        dashButton.classList.toggle("is-ready", state.dashCharge >= 1);
        livesEl.innerHTML = "";
        for (let i = 0; i < state.maxLives; i += 1) {
          const life = document.createElement("span");
          life.className = `life${i >= state.lives ? " empty" : ""}`;
          livesEl.appendChild(life);
        }
      }

      function showOverlay(title, text, label, showResults = false) {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        startButton.textContent = label;
        modePanel.classList.toggle("hidden", showResults || state.paused);
        resultRow.classList.toggle("hidden", !showResults);
        if (showResults) {
          resultScore.textContent = formatScore(state.score);
          resultBest.textContent = formatScore(state.best);
          resultRank.textContent = rankFor(state.score);
          resultTime.textContent = formatTime(state.time);
          resultCombo.textContent = `x${(1 + Math.min(3, state.maxCombo * 0.07)).toFixed(1)}`;
          resultNear.textContent = String(state.nearMisses);
        }
        overlay.classList.remove("hidden");
      }

      function reset() {
        const mode = currentMode();
        playSound("start");
        startMusic();
        state.playing = true;
        state.paused = false;
        state.ended = false;
        state.score = 0;
        state.maxLives = mode.lives;
        state.lives = state.maxLives;
        state.combo = 0;
        state.comboTimer = 0;
        state.multiplier = 1;
        state.maxCombo = 0;
        state.nearMisses = 0;
        state.hitsTaken = 0;
        state.coachTimer = 0;
        coach.classList.add("hidden");
        state.sector = 1;
        state.time = 0;
        state.scroll = 0;
        state.spawnTimer = 0.22;
        state.waveTimer = 1.8;
        state.dashCharge = 1;
        state.dashActive = 0;
        state.invincible = 1.2;
        state.shake = 0;
        state.flash = 0;
        state.objects = [];
        state.particles = [];
        state.floaters = [];
        state.shockwaves = [];
        state.keys.clear();
        state.pointerX = null;
        player.x = state.width / 2;
        player.vx = 0;
        player.lean = 0;
        player.trail = [];
        overlay.classList.add("hidden");
        setCoach(`${mode.label}模式 · ${state.perf.mobile ? "按住屏幕横向拖动，右下角闪电可冲刺。" : "方向键或 A/D 移动，空格冲刺。"}`, 4.2);
        updateHud();
      }

      function setPause(paused) {
        if (!state.playing || state.ended) return;
        state.paused = paused;
        if (paused) {
          stopMusic();
          showOverlay("星潮静止", "引擎保持待命。", "继续", false);
        } else {
          overlay.classList.add("hidden");
          state.lastTime = performance.now();
          startMusic();
        }
      }

      function endGame() {
        state.ended = true;
        state.playing = false;
        state.best = Math.max(state.best, Math.floor(state.score));
        storage.set("starDodgeBestV2", String(state.best));
        playSound("hit");
        stopMusic();
        updateHud();
        showOverlay("航线中断", `存活 ${formatTime(state.time)} · 擦身 ${state.nearMisses} 次 · ${nextRankHint(state.score)}`, "再来一局", true);
      }

      function addFloater(text, x, y, color = "#f8fbff") {
        state.floaters.push({
          text,
          x,
          y,
          vy: -44,
          life: 0.95,
          maxLife: 0.95,
          color,
        });
      }

      function addParticles(x, y, color, count, force, spread = Math.PI * 2) {
        const budget = state.perf.maxParticles - state.particles.length;
        if (budget <= 0) return;
        const actualCount = Math.min(state.perf.lowPower ? Math.ceil(count * 0.45) : count, budget);
        for (let i = 0; i < actualCount; i += 1) {
          const angle = -Math.PI / 2 + rand(-spread / 2, spread / 2);
          const speed = rand(force * 0.24, force);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.32, 0.82),
            maxLife: 0.82,
            r: rand(1.2, 4.2),
            color,
          });
        }
      }

      function addShockwave(x, y, color = "#79ffd7", size = 128) {
        state.shockwaves.push({
          x,
          y,
          r: 16,
          target: size,
          life: 0.42,
          maxLife: 0.42,
          color,
        });
      }

      function makeMeteorShape(points, radius) {
        return Array.from({ length: points }, (_, index) => {
          const a = (index / points) * Math.PI * 2;
          return {
            x: Math.cos(a) * radius * rand(0.72, 1.1),
            y: Math.sin(a) * radius * rand(0.72, 1.08),
          };
        });
      }

      function makeObject(type, x = null, y = null) {
        const mode = currentMode();
        const difficulty = Math.min(2.45, (1.2 + state.time / 38) * mode.difficulty);
        const radius = type === "meteor" ? rand(29, 46) * mode.meteorSize : type === "shard" ? rand(18, 28) : type === "shield" ? 20 : rand(15, 22);
        return {
          type,
          x: x ?? rand(radius + 18, state.width - radius - 18),
          y: y ?? -radius - rand(24, 90),
          radius,
          speed: (type === "meteor" ? rand(132, 232) : type === "shard" ? rand(184, 306) : rand(150, 246)) * difficulty * mode.speed,
          drift: rand(-38, 38),
          sway: rand(0, Math.PI * 2),
          spin: rand(-2.2, 2.2),
          angle: rand(0, Math.PI * 2),
          trail: [],
          nearMissed: false,
          shape: type === "meteor" ? makeMeteorShape(12, radius) : null,
          color: type === "shard" ? pick(["#b69cff", "#7dc8ff", "#ff6b8b"]) : "#ffd166",
        };
      }

      function spawnLine(type, count, yOffset = 0) {
        const spacing = state.width / (count + 1);
        for (let i = 0; i < count; i += 1) {
          state.objects.push(makeObject(type, spacing * (i + 1) + rand(-18, 18), -40 - yOffset - i * 18));
        }
      }

      function spawnWave() {
        const mode = currentMode();
        const roll = Math.random();
        if (state.time < 3.2) {
          state.objects.push(makeObject("core"));
          return;
        }
        if (state.time < 10) {
          if (roll < 0.68) {
            state.objects.push(makeObject("core"));
          } else if (roll < 0.88) {
            spawnLine("core", 3, rand(0, 20));
          } else {
            const meteor = makeObject("meteor");
            meteor.speed *= 0.58;
            meteor.radius *= 0.92;
            state.objects.push(meteor);
          }
          return;
        }
        if (state.lives < state.maxLives && roll > 0.91) {
          state.objects.push(makeObject("shield"));
          return;
        }

        if (roll < 0.22) {
          state.objects.push(makeObject("core"));
          if (state.time > 8 && Math.random() > 0.56) state.objects.push(makeObject("shard"));
        } else if (roll < 0.5) {
          spawnLine("core", Math.random() > 0.45 ? 4 : 5, rand(0, 30));
        } else if (roll < 0.72) {
          state.objects.push(makeObject("meteor"));
          if (state.time > 10 && Math.random() > 0.42) state.objects.push(makeObject("core"));
        } else {
          state.objects.push(makeObject("shard"));
          if (state.time > 10 && Math.random() < mode.meteorCount * 0.42) state.objects.push(makeObject(Math.random() > 0.52 ? "meteor" : "core"));
        }
      }

      function triggerDash() {
        if (!state.playing || state.paused || state.ended || state.dashCharge < 1) return;
        state.dashCharge = 0;
        state.dashActive = 0.44;
        state.invincible = Math.max(state.invincible, 0.56);
        state.shake = Math.max(state.shake, 0.12);
        state.flash = Math.max(state.flash, 0.12);
        addShockwave(player.x, player.y, "#7dc8ff", 220);
        addParticles(player.x, player.y + 16, "#7dc8ff", 34, 270, Math.PI * 1.25);
        playSound("dash");
        updateHud();
      }

      function collectObject(object) {
        if (object.type === "core") {
          state.combo += 1;
          state.maxCombo = Math.max(state.maxCombo, state.combo);
          state.comboTimer = 3.1;
          state.multiplier = 1 + Math.min(3, state.combo * 0.07);
          const gain = Math.round(12 * state.multiplier + Math.min(state.combo, 16));
          state.score += gain;
          addFloater(`+${gain}`, object.x, object.y, "#ffd166");
          addParticles(object.x, object.y, "#ffd166", 18, 180);
          playSound("collect");
        } else if (object.type === "shield") {
          state.lives = Math.min(state.maxLives, state.lives + 1);
          state.invincible = 1.5;
          state.score += 35;
          addFloater("+Shield", object.x, object.y, "#79ffd7");
          addShockwave(object.x, object.y, "#79ffd7", 150);
          addParticles(object.x, object.y, "#79ffd7", 26, 220);
          playSound("shield");
        } else if (state.dashActive > 0) {
          const gain = object.type === "meteor" ? 45 : 32;
          state.score += gain;
          addFloater(`Break +${gain}`, object.x, object.y, "#7dc8ff");
          addShockwave(object.x, object.y, "#7dc8ff", 130);
          addParticles(object.x, object.y, object.type === "meteor" ? "#ffb06b" : object.color, 28, 240);
        } else if (state.invincible <= 0) {
          state.combo = 0;
          state.comboTimer = 0;
          state.multiplier = 1;
          state.lives -= 1;
          state.hitsTaken += 1;
          state.shake = 0.28;
          state.flash = 0.2;
          state.invincible = 1.35;
          addFloater("-Energy", player.x, player.y - 34, "#ff6b8b");
          addShockwave(player.x, player.y, "#ff6b8b", 190);
          addParticles(player.x, player.y, "#ff6b8b", 34, 260);
          playSound("hit");
          if (state.lives <= 0) endGame();
        }
        updateHud();
      }

      function update(dt) {
        if (!state.playing || state.paused) return;

        const mode = currentMode();
        const difficulty = Math.min(2.35, (1.18 + state.time / 42) * mode.difficulty);
        state.time += dt;
        updateCoach(dt);
        state.scroll += dt * (126 + difficulty * 72) * mode.speed;
        state.sector = 1 + Math.floor(state.score / 450);
        state.spawnTimer -= dt;
        state.waveTimer -= dt;
        state.invincible = Math.max(0, state.invincible - dt);
        state.dashActive = Math.max(0, state.dashActive - dt);
        state.shake = Math.max(0, state.shake - dt);
        state.flash = Math.max(0, state.flash - dt);
        state.dashCharge = clamp(state.dashCharge + dt / 1.85, 0, 1);
        state.score += dt * (8 + difficulty * 7) * state.multiplier * mode.score;

        if (state.comboTimer > 0) {
          state.comboTimer -= dt;
          if (state.comboTimer <= 0) {
            state.combo = Math.max(0, Math.floor(state.combo * 0.45));
            state.multiplier = 1 + Math.min(3, state.combo * 0.07);
          }
        }

        if (state.spawnTimer <= 0) {
          spawnWave();
          const baseSpawn = state.time < 10 ? rand(0.54, 0.86) : Math.max(0.23, rand(0.48, 0.74) - state.time * 0.0025);
          state.spawnTimer = baseSpawn * mode.spawn;
        }

        if (state.waveTimer <= 0 && state.time >= 10) {
          if (Math.random() > 0.52) {
            spawnLine("core", 5, 0);
          } else {
            state.objects.push(makeObject("meteor", state.width * 0.32, -60));
            if (mode.meteorCount > 0.84) state.objects.push(makeObject("meteor", state.width * 0.72, -150));
            state.objects.push(makeObject("core", state.width * 0.5, -90));
          }
          state.waveTimer = rand(4.2, 6.4) * mode.spawn;
        }

        const left = state.keys.has("ArrowLeft") || state.keys.has("KeyA");
        const right = state.keys.has("ArrowRight") || state.keys.has("KeyD");
        let targetSpeed = 0;
        if (left) targetSpeed -= 1;
        if (right) targetSpeed += 1;
        if (state.pointerX !== null) {
          const distance = state.pointerX - player.x;
          targetSpeed = clamp(distance / (state.perf.mobile ? 58 : 86), -1, 1);
        }

        const dashBoost = state.dashActive > 0 ? 1.75 : 1;
        const baseMove = state.perf.mobile ? 560 : 470;
        player.vx += (targetSpeed * baseMove * dashBoost - player.vx) * Math.min(1, dt * (state.perf.mobile ? 13 : 9.5));
        player.x = clamp(player.x + player.vx * dt, 36, state.width - 36);
        player.lean += (clamp(player.vx / 520, -1, 1) - player.lean) * Math.min(1, dt * 8);
        player.trail.push({ x: player.x, y: player.y + 20, life: 0.28, size: state.dashActive > 0 ? 18 : 9 });
        if (player.trail.length > state.perf.maxTrail) player.trail.splice(0, player.trail.length - state.perf.maxTrail);
        player.trail = player.trail.filter((point) => {
          point.life -= dt;
          point.y += 120 * dt;
          return point.life > 0;
        });

        for (const object of state.objects) {
          object.angle += object.spin * dt;
          object.sway += dt * (2.1 + difficulty * 0.64);
          object.y += object.speed * dt;
          object.x += (Math.sin(object.sway) * 20 + object.drift) * dt;
          if (state.perf.drawObjectTrails) {
            object.trail.push({ x: object.x, y: object.y, life: 0.28 });
            if (object.trail.length > state.perf.maxTrail) object.trail.shift();
          }
        }

        for (const particle of state.particles) {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 95 * dt;
          particle.vx *= 1 - dt * 0.8;
        }

        for (const floater of state.floaters) {
          floater.life -= dt;
          floater.y += floater.vy * dt;
          floater.vy += 18 * dt;
        }

        for (const wave of state.shockwaves) {
          wave.life -= dt;
          wave.r += (wave.target - wave.r) * Math.min(1, dt * 7);
        }

        state.objects = state.objects.filter((object) => {
          const dx = object.x - player.x;
          const dy = object.y - player.y;
          const hitRadius = object.type === "core" || object.type === "shield" ? object.radius + 15 : object.radius + player.radius * 0.7;
          const hit = Math.hypot(dx, dy) < hitRadius;
          if (hit) {
            collectObject(object);
            return false;
          }
          if ((object.type === "meteor" || object.type === "shard") && !object.nearMissed && dy > 8 && Math.abs(dx) < object.radius + 28 && Math.abs(dy) < 74) {
            object.nearMissed = true;
            state.score += 18 * state.multiplier;
            state.nearMisses += 1;
            state.combo += 1;
            state.maxCombo = Math.max(state.maxCombo, state.combo);
            state.comboTimer = 2.5;
            state.multiplier = 1 + Math.min(3, state.combo * 0.07);
            addFloater("Near +18", object.x, object.y, "#7dc8ff");
            addParticles(player.x, player.y - 12, "#7dc8ff", 8, 110, Math.PI * 0.9);
          }
          return object.y < state.height + object.radius + 70 && object.x > -80 && object.x < state.width + 80;
        });

        state.particles = state.particles.filter((particle) => particle.life > 0);
        state.floaters = state.floaters.filter((floater) => floater.life > 0);
        state.shockwaves = state.shockwaves.filter((wave) => wave.life > 0);
        updateHud();
      }

      function drawBackground(dt) {
        const sky = ctx.createLinearGradient(0, 0, 0, state.height);
        sky.addColorStop(0, "#07101e");
        sky.addColorStop(0.46, "#15101d");
        sky.addColorStop(1, "#071f23");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.save();
        if (state.perf.drawNebulaEveryFrame) {
          for (const cloud of state.nebulae) {
            const x = (cloud.x + Math.sin(state.time * cloud.drift) * 40 + state.width) % state.width;
            const y = cloud.y + Math.cos(state.time * cloud.drift * 0.8) * 26;
            const glow = ctx.createRadialGradient(x, y, 0, x, y, cloud.r);
            glow.addColorStop(0, cloud.color);
            glow.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, cloud.r, 0, Math.PI * 2);
            ctx.fill();
          }
        } else {
          ctx.globalAlpha = 0.2;
          ctx.fillStyle = "rgba(121, 255, 215, 0.12)";
          ctx.beginPath();
          ctx.ellipse(state.width * 0.22, state.height * 0.2, state.width * 0.26, state.height * 0.14, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 107, 139, 0.1)";
          ctx.beginPath();
          ctx.ellipse(state.width * 0.78, state.height * 0.28, state.width * 0.28, state.height * 0.16, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.globalCompositeOperation = "screen";
        for (const star of state.stars) {
          star.y += (22 + star.depth * 64) * dt;
          if (star.y > state.height + 8) {
            star.y = -8;
            star.x = Math.random() * state.width;
          }
          const twinkle = 0.74 + Math.sin(state.time * star.twinkle + star.x) * 0.26;
          ctx.globalAlpha = star.alpha * twinkle;
          ctx.fillStyle = star.color;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r * star.depth, 0, Math.PI * 2);
          ctx.fill();
          if (star.flare && !state.perf.lowPower) {
            const flare = star.r * star.depth * 3.1;
            ctx.globalAlpha = star.alpha * twinkle * 0.34;
            ctx.strokeStyle = star.color;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(star.x - flare, star.y);
            ctx.lineTo(star.x + flare, star.y);
            ctx.moveTo(star.x, star.y - flare);
            ctx.lineTo(star.x, star.y + flare);
            ctx.stroke();
          }
        }
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
        ctx.restore();

        drawCorridor();
      }

      function drawCorridor() {
        const center = state.width / 2;
        const horizon = state.height * 0.18;
        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.strokeStyle = "rgba(125, 200, 255, 0.38)";
        ctx.lineWidth = 1;
        for (let i = -3; i <= 3; i += 1) {
          const bottomX = center + i * state.width * 0.18;
          ctx.beginPath();
          ctx.moveTo(center + i * 18, horizon);
          ctx.quadraticCurveTo(center + i * state.width * 0.09, state.height * 0.55, bottomX, state.height + 30);
          ctx.stroke();
        }

        const step = 72;
        const offset = state.scroll % step;
        for (let y = horizon + offset; y < state.height + step; y += step) {
          const t = (y - horizon) / (state.height - horizon);
          const half = state.width * (0.08 + t * 0.54);
          ctx.globalAlpha = 0.16 * t;
          ctx.beginPath();
          ctx.moveTo(center - half, y);
          ctx.lineTo(center + half, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawStar(cx, cy, spikes, outer, inner, fill) {
        let rotation = -Math.PI / 2;
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i += 1) {
          const radius = i % 2 === 0 ? outer : inner;
          const x = cx + Math.cos(rotation) * radius;
          const y = cy + Math.sin(rotation) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
          rotation += Math.PI / spikes;
        }
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
      }

      function drawObjectTrail(object, color) {
        if (!state.perf.drawObjectTrails) return;
        if (!object.trail.length) return;
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (let i = 0; i < object.trail.length; i += 1) {
          const point = object.trail[i];
          const alpha = (i + 1) / object.trail.length;
          ctx.globalAlpha = alpha * 0.12;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(point.x, point.y, object.radius * (0.35 + alpha * 0.25), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawMeteor(object) {
        drawObjectTrail(object, "#ff8d6b");
        if (sprites.meteor.complete && sprites.meteor.naturalWidth) {
          ctx.save();
          ctx.translate(object.x, object.y);
          ctx.rotate(object.angle);
          const size = object.radius * 3.25;
          if (!state.perf.lowPower) {
            ctx.shadowBlur = 18;
            ctx.shadowColor = "rgba(255, 122, 58, 0.45)";
          }
          ctx.drawImage(sprites.meteor, -size / 2, -size / 2, size, size);
          ctx.shadowBlur = 0;
          ctx.restore();
          return;
        }
        ctx.save();
        ctx.translate(object.x, object.y);
        ctx.rotate(object.angle);
        const flame = ctx.createLinearGradient(-object.radius * 2.6, 0, 0, 0);
        flame.addColorStop(0, "rgba(255, 107, 139, 0)");
        flame.addColorStop(0.42, "rgba(255, 107, 139, 0.34)");
        flame.addColorStop(1, "rgba(255, 209, 102, 0.58)");
        ctx.fillStyle = flame;
        ctx.beginPath();
        ctx.moveTo(-object.radius * 2.7, -object.radius * 0.68);
        ctx.lineTo(-object.radius * 0.12, -object.radius);
        ctx.lineTo(object.radius * 0.22, object.radius * 0.8);
        ctx.lineTo(-object.radius * 2.45, object.radius * 0.66);
        ctx.closePath();
        ctx.fill();

        const rock = ctx.createRadialGradient(-object.radius * 0.28, -object.radius * 0.35, object.radius * 0.1, 0, 0, object.radius * 1.35);
        rock.addColorStop(0, "#c2a093");
        rock.addColorStop(0.42, "#796269");
        rock.addColorStop(1, "#302934");
        ctx.fillStyle = rock;
        ctx.strokeStyle = "#ffbd83";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        for (let i = 0; i < object.shape.length; i += 1) {
          const point = object.shape[i];
          if (i === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        const pits = [
          [-0.28, -0.18, 0.22],
          [0.26, 0.22, 0.17],
          [0.08, -0.48, 0.11],
          [-0.06, 0.42, 0.13],
        ];
        for (const [x, y, r] of pits) {
          const pit = ctx.createRadialGradient(object.radius * x, object.radius * y, 0, object.radius * x, object.radius * y, object.radius * r);
          pit.addColorStop(0, "rgba(20, 15, 21, 0.62)");
          pit.addColorStop(1, "rgba(255, 210, 150, 0.08)");
          ctx.fillStyle = pit;
          ctx.beginPath();
          ctx.arc(object.radius * x, object.radius * y, object.radius * r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 0.46;
        ctx.strokeStyle = "rgba(255, 231, 185, 0.62)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-object.radius * 0.48, -object.radius * 0.34);
        ctx.quadraticCurveTo(-object.radius * 0.1, -object.radius * 0.16, object.radius * 0.26, -object.radius * 0.36);
        ctx.moveTo(-object.radius * 0.18, object.radius * 0.34);
        ctx.quadraticCurveTo(object.radius * 0.12, object.radius * 0.12, object.radius * 0.5, object.radius * 0.22);
        ctx.stroke();
        ctx.restore();
      }

      function drawShard(object) {
        drawObjectTrail(object, object.color);
        ctx.save();
        ctx.translate(object.x, object.y);
        ctx.rotate(object.angle);
        if (!state.perf.lowPower) {
          ctx.shadowBlur = 16;
          ctx.shadowColor = object.color;
        }
        const gem = ctx.createLinearGradient(-object.radius, -object.radius, object.radius, object.radius);
        gem.addColorStop(0, "#f8fbff");
        gem.addColorStop(0.38, object.color);
        gem.addColorStop(1, "#241827");
        ctx.fillStyle = gem;
        ctx.strokeStyle = "rgba(255,255,255,0.74)";
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(0, -object.radius * 1.15);
        ctx.lineTo(object.radius * 0.8, -object.radius * 0.1);
        ctx.lineTo(object.radius * 0.28, object.radius * 1.16);
        ctx.lineTo(-object.radius * 0.72, object.radius * 0.34);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.globalAlpha = 0.46;
        ctx.strokeStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(0, -object.radius * 1.1);
        ctx.lineTo(0, object.radius * 1.08);
        ctx.moveTo(-object.radius * 0.62, object.radius * 0.26);
        ctx.lineTo(object.radius * 0.72, -object.radius * 0.08);
        ctx.stroke();
        ctx.restore();
      }

      function drawCore(object) {
        drawObjectTrail(object, "#ffd166");
        if (sprites.prism.complete && sprites.prism.naturalWidth) {
          ctx.save();
          ctx.translate(object.x, object.y);
          ctx.rotate(object.angle);
          ctx.globalCompositeOperation = "lighter";
          if (!state.perf.lowPower) {
            ctx.shadowBlur = 26;
            ctx.shadowColor = "#79ffd7";
          }
          const pulse = 1 + Math.sin(state.time * 5 + object.sway) * 0.04;
          const size = object.radius * 3.25 * pulse;
          ctx.globalAlpha = 0.96;
          ctx.drawImage(sprites.prism, -size / 2, -size / 2, size, size);
          ctx.globalAlpha = 0.34;
          ctx.strokeStyle = "#79ffd7";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.ellipse(0, 0, object.radius * 1.45, object.radius * 0.52, state.time * 0.9, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation = "source-over";
          ctx.restore();
          return;
        }
        ctx.save();
        ctx.translate(object.x, object.y);
        ctx.rotate(object.angle);
        if (!state.perf.lowPower) {
          ctx.shadowBlur = 24;
          ctx.shadowColor = "#ffd166";
        }
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = 0.32;
        ctx.strokeStyle = "#ffd166";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(0, 0, object.radius * 1.28, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        const outer = ctx.createRadialGradient(0, 0, object.radius * 0.16, 0, 0, object.radius);
        outer.addColorStop(0, "#fffef2");
        outer.addColorStop(0.32, "#ffd166");
        outer.addColorStop(1, "#ff8f6b");
        drawStar(0, 0, 6, object.radius, object.radius * 0.46, outer);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.9;
        drawStar(0, 0, 6, object.radius * 0.56, object.radius * 0.22, "#fff8c7");
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
        ctx.restore();
      }

      function drawShield(object) {
        drawObjectTrail(object, "#79ffd7");
        ctx.save();
        ctx.translate(object.x, object.y);
        ctx.rotate(object.angle);
        ctx.strokeStyle = "#79ffd7";
        ctx.fillStyle = "rgba(121, 255, 215, 0.17)";
        ctx.lineWidth = 3;
        if (!state.perf.lowPower) {
          ctx.shadowBlur = 20;
          ctx.shadowColor = "#79ffd7";
        }
        ctx.beginPath();
        ctx.moveTo(0, -object.radius);
        ctx.lineTo(object.radius * 0.86, -object.radius * 0.36);
        ctx.quadraticCurveTo(object.radius * 0.65, object.radius * 0.68, 0, object.radius * 1.08);
        ctx.quadraticCurveTo(-object.radius * 0.65, object.radius * 0.68, -object.radius * 0.86, -object.radius * 0.36);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawPlayerTrail() {
        if (!state.perf.drawPlayerGlow) return;
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const point of player.trail) {
          const alpha = clamp(point.life / 0.28, 0, 1);
          const glow = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, point.size * 2.2);
          glow.addColorStop(0, `rgba(121, 255, 215, ${0.26 * alpha})`);
          glow.addColorStop(0.48, `rgba(125, 200, 255, ${0.14 * alpha})`);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(point.x, point.y, point.size * 2.2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPlayer() {
        drawPlayerTrail();
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.lean * 0.28);

        if (state.invincible > 0 || state.dashActive > 0) {
          const alpha = state.dashActive > 0 ? 0.72 : 0.36 + Math.sin(state.time * 20) * 0.14;
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = state.dashActive > 0 ? "#7dc8ff" : "#79ffd7";
          ctx.lineWidth = state.dashActive > 0 ? 4 : 3;
          if (!state.perf.lowPower) {
            ctx.shadowBlur = 24;
            ctx.shadowColor = ctx.strokeStyle;
          }
          ctx.beginPath();
          ctx.arc(0, 0, player.radius * (state.dashActive > 0 ? 1.58 : 1.34), 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;
        }

        if (sprites.ship.complete && sprites.ship.naturalWidth) {
          const size = player.radius * 4.3;
          if (!state.perf.lowPower) {
            ctx.shadowBlur = 22;
            ctx.shadowColor = "rgba(125, 200, 255, 0.42)";
          }
          ctx.drawImage(sprites.ship, -size / 2, -size * 0.58, size, size);
          ctx.shadowBlur = 0;
          ctx.restore();
          return;
        }

        const flameHeight = (state.dashActive > 0 ? 44 : 25) + Math.sin(state.time * 24) * 5;
        const flame = ctx.createLinearGradient(0, 16, 0, flameHeight + 34);
        flame.addColorStop(0, "#fff8c7");
        flame.addColorStop(0.36, "#ffd166");
        flame.addColorStop(0.72, "#ff6b8b");
        flame.addColorStop(1, "rgba(255, 107, 139, 0)");
        ctx.fillStyle = flame;
        ctx.beginPath();
        ctx.moveTo(-10, 17);
        ctx.quadraticCurveTo(0, flameHeight + 34, 10, 17);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(248, 251, 255, 0.34)";
        ctx.lineWidth = 1.4;
        const wing = ctx.createLinearGradient(-38, 0, 38, 32);
        wing.addColorStop(0, "#7dc8ff");
        wing.addColorStop(0.44, "#79ffd7");
        wing.addColorStop(1, "#ff6b8b");
        ctx.fillStyle = wing;
        ctx.beginPath();
        ctx.moveTo(-18, 14);
        ctx.lineTo(-40, 34);
        ctx.lineTo(-25, -5);
        ctx.lineTo(-8, 8);
        ctx.closePath();
        ctx.moveTo(18, 14);
        ctx.lineTo(40, 34);
        ctx.lineTo(25, -5);
        ctx.lineTo(8, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        const body = ctx.createLinearGradient(-20, -30, 20, 26);
        body.addColorStop(0, "#f8fbff");
        body.addColorStop(0.42, "#79ffd7");
        body.addColorStop(1, "#7dc8ff");
        ctx.fillStyle = body;
        if (!state.perf.lowPower) {
          ctx.shadowBlur = 16;
          ctx.shadowColor = "rgba(121,255,215,0.35)";
        }
        ctx.beginPath();
        ctx.moveTo(0, -34);
        ctx.bezierCurveTo(17, -12, 22, 7, 17, 20);
        ctx.lineTo(0, 9);
        ctx.lineTo(-17, 20);
        ctx.bezierCurveTo(-22, 7, -17, -12, 0, -34);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(248, 251, 255, 0.58)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.globalAlpha = 0.62;
        ctx.strokeStyle = "rgba(7, 16, 30, 0.52)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(0, -27);
        ctx.lineTo(0, 15);
        ctx.moveTo(-12, 9);
        ctx.lineTo(12, 9);
        ctx.stroke();
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(7, 16, 30, 0.78)";
        ctx.beginPath();
        ctx.ellipse(0, -10, 7.5, 11.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(248, 251, 255, 0.52)";
        ctx.lineWidth = 1.3;
        ctx.stroke();
        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle = "rgba(121, 255, 215, 0.82)";
        ctx.beginPath();
        ctx.arc(-12, 13, 2.5, 0, Math.PI * 2);
        ctx.arc(12, 13, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.r * (0.7 + alpha * 0.55), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawFloaters() {
        ctx.save();
        ctx.font = "700 15px Inter, Microsoft YaHei, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (const floater of state.floaters) {
          const alpha = clamp(floater.life / floater.maxLife, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 14;
          ctx.shadowColor = floater.color;
          ctx.fillStyle = floater.color;
          ctx.fillText(floater.text, floater.x, floater.y);
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      function drawShockwaves() {
        ctx.save();
        for (const wave of state.shockwaves) {
          const alpha = clamp(wave.life / wave.maxLife, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = wave.color;
          ctx.lineWidth = 4 * alpha;
          ctx.shadowBlur = 20;
          ctx.shadowColor = wave.color;
          ctx.beginPath();
          ctx.arc(wave.x, wave.y, wave.r, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      function render(dt) {
        drawBackground(dt);

        ctx.save();
        if (state.shake > 0) {
          const strength = state.shake * 30;
          ctx.translate(rand(-strength, strength), rand(-strength, strength));
        }

        for (const object of state.objects) {
          if (object.type === "meteor") drawMeteor(object);
          else if (object.type === "shard") drawShard(object);
          else if (object.type === "shield") drawShield(object);
          else drawCore(object);
        }

        drawShockwaves();
        drawParticles();
        drawPlayer();
        drawFloaters();
        ctx.restore();

        if (state.flash > 0) {
          ctx.globalAlpha = state.flash * 1.7;
          ctx.fillStyle = "#f8fbff";
          ctx.fillRect(0, 0, state.width, state.height);
          ctx.globalAlpha = 1;
        }
      }

      function loop(now) {
        const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
        state.lastTime = now;
        update(dt);
        render(dt);
        requestAnimationFrame(loop);
      }

      function holdButton(button, code) {
        const down = (event) => {
          event.preventDefault();
          state.keys.add(code);
          button.classList.add("is-down");
        };
        const up = (event) => {
          event.preventDefault();
          state.keys.delete(code);
          button.classList.remove("is-down");
        };
        button.addEventListener("pointerdown", down);
        button.addEventListener("pointerup", up);
        button.addEventListener("pointerleave", up);
        button.addEventListener("pointercancel", up);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", "KeyA", "KeyD"].includes(event.code)) {
          event.preventDefault();
          state.keys.add(event.code);
        }
        if (event.code === "ShiftLeft" || event.code === "ShiftRight" || event.code === "Space") {
          event.preventDefault();
          if (!state.playing || state.ended || state.paused) {
            if (!state.playing || state.ended) reset();
            else setPause(false);
          } else {
            triggerDash();
          }
        }
        if (event.code === "KeyP" || event.code === "Escape") {
          event.preventDefault();
          setPause(!state.paused);
        }
        if (event.code === "Enter" && (!state.playing || state.ended || state.paused)) {
          event.preventDefault();
          if (state.paused && state.playing) setPause(false);
          else reset();
        }
      });
      window.addEventListener("keyup", (event) => state.keys.delete(event.code));

      canvas.addEventListener("pointerdown", (event) => {
        if (!state.playing || state.paused) return;
        event.preventDefault();
        state.pointerX = event.clientX;
        canvas.setPointerCapture?.(event.pointerId);
        if (state.time < 8) setCoach("很好，跟着星核走。能量满时点闪电冲刺。", 2.2);
      });
      canvas.addEventListener("pointermove", (event) => {
        event.preventDefault();
        if (state.pointerX !== null) state.pointerX = event.clientX;
      });
      canvas.addEventListener("pointerup", (event) => {
        event.preventDefault();
        state.pointerX = null;
        canvas.releasePointerCapture?.(event.pointerId);
      });
      canvas.addEventListener("pointercancel", (event) => {
        event.preventDefault();
        state.pointerX = null;
      });

      startButton.addEventListener("click", () => {
        if (state.paused && state.playing) setPause(false);
        else reset();
      });
      modeButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
      soundButton.addEventListener("click", () => {
        state.muted = !state.muted;
        storage.set("starDodgeMutedV2", state.muted ? "1" : "0");
        updateSoundIcon();
        if (state.muted) {
          stopMusic();
        } else {
          playSound("collect");
          if (state.playing && !state.paused && !state.ended) startMusic();
        }
      });
      pauseButton.addEventListener("click", () => setPause(!state.paused));
      restartButton.addEventListener("click", reset);
      dashButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        dashButton.classList.add("is-down");
        triggerDash();
      });
      dashButton.addEventListener("pointerup", () => dashButton.classList.remove("is-down"));
      dashButton.addEventListener("pointerleave", () => dashButton.classList.remove("is-down"));
      dashButton.addEventListener("pointercancel", () => dashButton.classList.remove("is-down"));
      holdButton(leftButton, "ArrowLeft");
      holdButton(rightButton, "ArrowRight");

      resize();
      setMode(state.mode);
      updateSoundIcon();
      updateHud();
      showOverlay("星轨闪避", currentMode().intro, "开始", false);
      requestAnimationFrame((now) => {
        state.lastTime = now;
        requestAnimationFrame(loop);
      });
    })();
  </script>
</body>
</html>
